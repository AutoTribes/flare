# Local development stack for Flare.
# The app container carries the Elixir toolchain (this machine has no host Elixir).
# Run mix via:  docker compose -f docker-compose.dev.yml exec -T app mix <args>
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flare_dev
    ports:
      - "55432:5432" # host access for debugging; app talks to `db:5432` over the network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - flare_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    image: hexpm/elixir:1.17.3-erlang-27.1.2-debian-bookworm-20241016-slim
    working_dir: /app
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Consumed by config/*.exs (we wire these in Task 0)
      DATABASE_HOST: db
      DATABASE_URL: ecto://postgres:postgres@db/flare_dev
      REDIS_URL: redis://redis:6379
      MIX_HOME: /app/.mix
      HEX_HOME: /app/.hex
    volumes:
      - .:/app

volumes:
  flare_pgdata:
